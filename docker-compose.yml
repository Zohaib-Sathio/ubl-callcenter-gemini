services:
  dev-ubldigital-callcenter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-ubl-callcenter-gemini
    ports:
      - "7021:7021"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./recordings:/app/recordings
      - ./pages:/app/pages
      - ./backend/data/chroma:/app/backend/data/chroma
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7021/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
