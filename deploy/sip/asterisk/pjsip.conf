; =============================================================================
; pjsip.conf — UBL call-center SIP trunk to Avaya Session Manager
; =============================================================================
; This config sets up Asterisk to receive SIP INVITEs from Avaya SM (IP-based
; auth, no registration, no username/password) and route them into the
; [from-avaya] dialplan context defined in extensions.conf.
;
; REPLACE BEFORE USE:
;   __AVAYA_SM_IP__     : IP address of the Avaya Session Manager (the SIP peer)
;   __THIS_VM_IP__      : IP address of this bank VM on its SIP-facing interface
;                         (used as contact / external address)
; =============================================================================

; --- Transport: listen on UDP/5060 on all interfaces -------------------------
; Avaya SIP trunks are typically UDP. If your Avaya team requires TCP or TLS,
; change `protocol=` to `tcp` or `tls` and adjust the port.
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; If this VM sits behind any NAT between itself and Avaya SM, set:
; external_media_address=__THIS_VM_IP__
; external_signaling_address=__THIS_VM_IP__

; --- Endpoint: one trusted peer = Avaya SM -----------------------------------
; IP-based auth only. Asterisk accepts INVITEs from this IP without
; SIP digest authentication, which is how most enterprise Avaya trunks work.
[avaya-sm]
type=endpoint
transport=transport-udp
context=from-avaya
disallow=all
allow=ulaw                 ; G.711 μ-law, 8 kHz — Avaya default
allow=alaw                 ; G.711 A-law fallback
direct_media=no            ; route media through Asterisk so AudioSocket can tap it
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733          ; matches RFC 2833 (standard for Avaya trunks)
trust_id_inbound=yes
timers=no                  ; disable session timers initially to avoid noise
send_pai=no
send_rpid=no

[avaya-sm-aor]
type=aor
; Where Asterisk sends requests TO Avaya SM (for outbound calls / OPTIONS).
; Uses 5060/UDP on the Avaya SM IP.
contact=sip:__AVAYA_SM_IP__:5060

[avaya-sm-identify]
type=identify
; Maps incoming INVITEs from this source IP to the [avaya-sm] endpoint.
endpoint=avaya-sm
match=__AVAYA_SM_IP__

; Link AOR to the endpoint so Asterisk can send OPTIONS keepalives
[avaya-sm](+)
aors=avaya-sm-aor

; =============================================================================
; Notes:
;  - No [auth] section: we trust by source IP (the [identify] block), which
;    is the standard pattern for Avaya SIP trunks.
;  - If the Avaya team insists on SIP digest auth, add an [auth] section and
;    reference it from [avaya-sm] via `auth=`, plus an [outbound-auth] for
;    any responses.
;  - To test the signaling link without a real call, from Asterisk CLI:
;      pjsip send invite dummy
;      pjsip show endpoints
;    You should see avaya-sm in "Not in use" state once OPTIONS ping succeeds.
; =============================================================================
