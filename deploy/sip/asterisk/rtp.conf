; =============================================================================
; rtp.conf — RTP media port range for Asterisk
; =============================================================================
; Asterisk allocates one RTP port pair (one each direction) per active call
; from this range. 10000 ports => up to ~5000 concurrent calls (far more than
; needed). The bank firewall request should allow UDP in this range.
; =============================================================================

[general]
rtpstart=10000
rtpend=20000

; Enable RTCP (standard; helps diagnose media problems)
rtcpinterval=5000

; Keep DSCP defaults; adjust only if the bank network team asks for QoS marks.
; Example:
; dtmftimeout=3000
; strictrtp=yes
