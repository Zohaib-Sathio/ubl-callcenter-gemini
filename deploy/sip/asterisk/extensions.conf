; =============================================================================
; extensions.conf — UBL call-center dialplan
; =============================================================================
; One context, [from-avaya]. Every inbound call from Avaya SM enters here.
; For every incoming number, we:
;   1. Answer the call (send 200 OK)
;   2. Generate a per-call UUID (required by AudioSocket protocol)
;   3. Hand the channel to the Python SIP bridge at 127.0.0.1:6090
;      via the AudioSocket() dialplan application
;   4. Hang up cleanly once the bridge disconnects
;
; The Python bridge handles everything above: greeting, Gemini conversation,
; workflow tools, DTMF collection, recording — so the dialplan stays tiny.
; =============================================================================

[globals]
AUDIOSOCKET_HOST=127.0.0.1
AUDIOSOCKET_PORT=6090

[from-avaya]
; Match any dialed number. If the bank team wants to restrict to a specific
; DID, change `_X.` to the exact DID (e.g. `exten => 111111,1,NoOp(...)`).
exten => _X.,1,NoOp(Inbound call: to=${EXTEN} from=${CALLERID(num)} uid=${UNIQUEID})
 same => n,Answer()

 ; Give Avaya a brief settle-time before we start streaming audio.
 ; Prevents the first word of the Gemini greeting from being clipped.
 same => n,Wait(0.3)

 ; AudioSocket requires a proper UUID. `uuidgen` is part of util-linux,
 ; present by default on RHEL 9. func_shell must be loaded (see modules.conf).
 same => n,Set(AS_UUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,Verbose(1,Bridging call to AudioSocket: uuid=${AS_UUID} host=${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})

 ; Force SLIN (signed linear PCM, 8 kHz) on both read/write so AudioSocket
 ; streams raw PCM to Python without transcoding surprises.
 same => n,Set(CHANNEL(audioreadformat)=slin)
 same => n,Set(CHANNEL(audiowriteformat)=slin)

 ; Hand off. AudioSocket blocks until the Python side disconnects or the
 ; caller hangs up — everything interesting happens inside it.
 same => n,AudioSocket(${AS_UUID},${AUDIOSOCKET_HOST}:${AUDIOSOCKET_PORT})

 same => n,Verbose(1,AudioSocket returned, call ${UNIQUEID} ending)
 same => n,Hangup()

; Fallback handlers (standard Asterisk pattern)
exten => h,1,NoOp(Hangup handler for ${UNIQUEID})
exten => i,1,NoOp(Invalid extension ${EXTEN})
 same => n,Hangup()
exten => t,1,NoOp(Response timeout for ${UNIQUEID})
 same => n,Hangup()

; =============================================================================
; Quick test extensions (optional — remove in production)
; =============================================================================
; Dial 9999 from a local softphone to hear Asterisk's built-in "hello world"
; demo. Confirms Asterisk audio path works before plugging in the Python side.
;
; [local-test]
; exten => 9999,1,Answer()
;  same => n,Playback(hello-world)
;  same => n,Hangup()
; =============================================================================
