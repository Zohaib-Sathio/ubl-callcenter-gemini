; =============================================================================
; modules.conf — Asterisk module loading
; =============================================================================
; We use autoload=yes (the default shipped with Asterisk) so every installed
; module is picked up, and then explicitly `preload` the few we truly depend on
; to make startup failures obvious (Asterisk will refuse to start if a
; preload'd module is missing, instead of failing silently mid-call).
; =============================================================================

[modules]
autoload=yes

; Core transport / channel driver for SIP over PJSIP
preload => res_pjsip.so
preload => chan_pjsip.so

; AudioSocket dialplan application + its transport module.
; These come from the `asterisk-audiosocket` RPM. If Asterisk refuses to
; start because these are missing, the RPM was not installed — see INSTALL.md.
preload => res_audiosocket.so
preload => app_audiosocket.so

; func_shell provides the ${SHELL(...)} dialplan function used in
; extensions.conf to call `uuidgen` for per-call UUIDs.
preload => func_shell.so

; =============================================================================
; The following modules are commonly NOT needed and can be disabled to cut
; log noise. Uncomment any line to disable the module.
; =============================================================================
; noload => chan_sip.so        ; legacy SIP channel, superseded by chan_pjsip
; noload => chan_iax2.so       ; IAX protocol, unused here
; noload => chan_mgcp.so       ; MGCP, unused
; noload => chan_skinny.so     ; Cisco SCCP, unused
; noload => cdr_mysql.so       ; enable only if you want MySQL CDRs
